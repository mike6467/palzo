services:
  - type: web
    name: pi-forwarder
    env: node
    region: oregon
    plan: free
    buildCommand: >
      pnpm install --frozen-lockfile &&
      BASE_PATH=/ pnpm --filter @workspace/pi-forwarder run build &&
      pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps ./artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: pi-forwarder-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true

databases:
  - name: pi-forwarder-db
    databaseName: pi_forwarder
    user: pi_forwarder
    region: oregon
    plan: free
